<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Motion Of Naimur</title>
<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f4f6f8; }
h1 { color:#333; }
table { width:100%; border-collapse:collapse; margin-top:20px; background:#fff; box-shadow:0 0 10px rgba(0,0,0,0.05);}
th, td { padding:12px; border:1px solid #ddd; text-align:left; }
th { background:#007BFF; color:#fff; }
tr:nth-child(even) { background:#f9f9f9; }
button { padding:6px 12px; border:none; border-radius:3px; cursor:pointer; color:#fff; }
button.edit { background:#ffc107; }
button.message { background:#17a2b8; }
button:hover { opacity:0.9; }
input, select { padding:6px; margin-right:10px; }
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:#fff; padding:20px; border-radius:5px; width:400px; }
.modal-content h2 { margin-top:0; }
.modal-content textarea, .modal-content input { width:100%; padding:6px; margin:8px 0; }
.modal-content button { margin-top:10px; }
</style>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<h1>Dashboard</h1>

<!-- Filters -->
<div>
<input type="text" id="searchInput" placeholder="Search Project...">
<select id="statusFilter">
  <option value="">All Status</option>
  <option value="Pending">Pending</option>
  <option value="Completed">Completed</option>
  <option value="In Progress">In Progress</option>
</select>
<button onclick="loadProjects()">Filter</button>
</div>

<!-- Projects Table -->
<table id="projectsTable">
<thead>
<tr>
<th>Project ID</th>
<th>Project Name</th>
<th>Category</th>
<th>Type</th>
<th>Client Email</th>
<th>Assigned Editor</th>
<th>Status</th>
<th>Revision Count</th>
<th>Version</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Revision Modal -->
<div class="modal" id="revisionModal">
<div class="modal-content">
<h2>Add Revision</h2>
<textarea id="revisionNotes" placeholder="Enter revision notes"></textarea>
<select id="revisionMethod">
  <option value="File Upload">File Upload</option>
  <option value="Drive">Drive</option>
  <option value="Dropbox">Dropbox</option>
  <option value="Frame.io">Frame.io</option>
</select>
<input type="text" id="filesLink" placeholder="Files / Links">
<button onclick="submitRevision()">Submit Revision</button>
<button onclick="closeModal('revisionModal')">Cancel</button>
</div>
</div>

<!-- Message Modal -->
<div class="modal" id="messageModal">
<div class="modal-content">
<h2>Send Message</h2>
<textarea id="messageText" placeholder="Enter message"></textarea>
<button onclick="submitMessage()">Send</button>
<button onclick="closeModal('messageModal')">Cancel</button>
</div>
</div>

<script>
let currentUser = { email:"", name:"", role:"" };
let selectedProjectID = "";

// Google Sign-In callback
function handleCredentialResponse(response){
  const userObject = JSON.parse(atob(response.credential.split('.')[1]));
  currentUser.email = userObject.email;
  currentUser.name = userObject.name || userObject.email;

  // Get role from Apps Script
  google.script.run.withSuccessHandler(role=>{
    currentUser.role = role;
    loadProjects();
  }).getUserRole(currentUser.email);
}

window.onload = function(){
  google.accounts.id.initialize({
    client_id: "YOUR_GOOGLE_CLIENT_ID",
    callback: handleCredentialResponse
  });
  google.accounts.id.prompt();
}

// Load projects
function loadProjects(){
  const searchValue = document.getElementById("searchInput").value.toLowerCase();
  const statusValue = document.getElementById("statusFilter").value;

  google.script.run.withSuccessHandler(projects=>{
    const tbody = document.querySelector("#projectsTable tbody");
    tbody.innerHTML = "";

    projects.forEach(project=>{
      const projectID = project[1];
      const projectName = project[2];
      const status = project[9];
      const revisionCount = project[22];
      const version = project[23];

      if((statusValue === "" || status === statusValue) &&
         (searchValue === "" || projectName.toLowerCase().includes(searchValue))){

        const tr = document.createElement("tr");
        tr.innerHTML = `
<td>${projectID}</td>
<td>${projectName}</td>
<td>${project[3]}</td>
<td>${project[4]}</td>
<td>${project[5]}</td>
<td>${project[7]}</td>
<td>${status}</td>
<td>${revisionCount}</td>
<td>${version}</td>
<td>
  <button class="edit" onclick="openRevisionModal('${projectID}')">Add Revision</button>
  <button class="message" onclick="openMessageModal('${projectID}')">Message</button>
</td>
        `;
        tbody.appendChild(tr);
      }
    });

  }).getProjectsForUser(currentUser.email, currentUser.role);
}

// Modals
function openRevisionModal(projectID){ selectedProjectID = projectID; document.getElementById('revisionModal').style.display="flex"; }
function openMessageModal(projectID){ selectedProjectID = projectID; document.getElementById('messageModal').style.display="flex"; }
function closeModal(id){ document.getElementById(id).style.display="none"; }

// Submit revision
function submitRevision(){
  const notes = document.getElementById('revisionNotes').value;
  const method = document.getElementById('revisionMethod').value;
  const files = document.getElementById('filesLink').value;

  if(!notes){ alert("Revision notes required"); return; }

  google.script.run.addRevision(selectedProjectID, {revisionNotes: notes, revisionMethod: method, filesLink: files}, currentUser.email, currentUser.role);
  alert("Revision added!");
  closeModal('revisionModal');
  loadProjects();
}

// Submit message
function submitMessage(){
  const text = document.getElementById('messageText').value;
  if(!text){ alert("Message required"); return; }

  google.script.run.addMessage(selectedProjectID, text, currentUser.email, currentUser.name, currentUser.role, "Text", true);
  alert("Message sent!");
  closeModal('messageModal');
}
</script>

</body>
</html>
