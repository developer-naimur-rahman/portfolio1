<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Of Naimur | Agency OS</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060b; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --accent: #00f2ff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; min-height: 100vh; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(16px); border:1px solid var(--border); }
        .glass-card { transition: all 0.4s ease; cursor: pointer; }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 20px 40px -20px rgba(0,242,255,0.2); }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; background: linear-gradient(90deg,#00f2ff,#0066ff); transition: width 1s ease; }
        
        .status-Pending { color:#f59e0b; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
        .status-InProgress { color:#3b82f6; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
        .status-Review { color:#a855f7; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.2); }
        .status-Completed { color:#10b981; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
        .status-URGENT { color:#ef4444; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(0,242,255,0.1); border-radius:50%; border-top-color: var(--accent); animation:spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input, select, textarea { background: rgba(255,255,255,0.05); border:1px solid var(--border); outline:none; color:white; padding:12px; border-radius:16px; width: 100%; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        label { display: block; margin-bottom: 6px; margin-left: 8px; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        #loginOverlay { position: fixed; inset: 0; background: #05060b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="flex">

<!-- Login Screen -->
<div id="loginOverlay">
    <div class="glass p-10 rounded-[40px] w-full max-w-md text-center shadow-2xl border-cyan-500/20">
        <div class="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center font-bold text-black italic text-3xl mx-auto mb-6 shadow-[0_0_30px_rgba(6,182,212,0.4)]">M</div>
        <h2 class="text-2xl font-black italic text-white uppercase tracking-tighter mb-2">Studio Access</h2>
        <p class="text-slate-500 text-sm mb-8 italic">Sign in with Google to manage production</p>
        <div class="flex justify-center">
            <div id="g_id_onload" data-client_id="388867750902-263hniv7d8v31m3l5pkphokg0scb9tos.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
        </div>
    </div>
</div>

<!-- Sidebar -->
<aside class="w-72 glass border-r border-white/5 p-8 flex flex-col fixed h-full z-50">
    <div class="mb-12">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center font-bold text-black italic shadow-[0_0_15px_rgba(6,182,212,0.5)]">M</div>
            <h1 class="text-xl font-bold text-white tracking-tighter italic uppercase">Motion Of Naimur</h1>
        </div>
        <p class="text-[10px] text-slate-500 uppercase tracking-[4px] ml-1 font-semibold">Production Console</p>
    </div>
    <nav class="space-y-3 flex-grow">
        <div onclick="location.reload()" class="flex items-center gap-3 p-4 glass rounded-2xl text-cyan-400 cursor-pointer hover:bg-white/5 transition-all">
            <i data-lucide="layout-grid" size="18"></i> <span class="font-bold text-sm">Dashboard</span>
        </div>
    </nav>
    <div class="pt-8 border-t border-white/5 space-y-4">
        <div class="flex items-center gap-3 p-2">
            <div id="userAvatar" class="w-10 h-10 rounded-full bg-cyan-500 flex items-center justify-center font-bold text-white shadow-lg overflow-hidden">N</div>
            <div class="overflow-hidden">
                <p id="userNameDisplay" class="font-bold text-white text-sm truncate">User</p>
                <p id="userRoleDisplay" class="text-[9px] text-slate-500 uppercase font-black tracking-widest italic">Client</p>
            </div>
        </div>
        <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-2 p-3 rounded-xl border border-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-widest hover:bg-red-500 hover:text-white transition-all">
            <i data-lucide="log-out" size="14"></i> Sign Out
        </button>
    </div>
</aside>

<!-- Main Dashboard -->
<main id="mainContent" class="ml-72 p-12 w-full max-w-[1600px] opacity-0 transition-opacity duration-700">
    <header class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-4xl font-extrabold tracking-tight text-white mb-2 italic">Studio Hub<span class="text-cyan-500">.</span></h2>
            <p class="text-slate-500 font-medium flex items-center gap-2 text-sm">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Production Pipeline Active
            </p>
        </div>
        <button id="launchBtn" onclick="toggleModal('pModal', true)" class="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-lg shadow-cyan-500/20 active:scale-95 transition-all uppercase tracking-widest text-xs">
            <i data-lucide="plus-circle" size="20"></i> Launch Production
        </button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-16">
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Active</p><h3 id="stat-active" class="text-4xl font-bold italic text-white">0</h3></div>
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Delivered</p><h3 id="stat-done" class="text-4xl font-bold text-green-400 italic">0</h3></div>
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Revisions</p><h3 id="stat-rev" class="text-4xl font-bold text-orange-400 italic">0</h3></div>
        <div class="glass p-8 rounded-[32px] border-b-4 border-cyan-500/30"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Revenue</p><h3 id="stat-revenue" class="text-4xl font-bold text-cyan-400 italic">USD 0</h3></div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center py-32"><div class="loading-spinner mb-6"></div></div>
    <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
</main>

<!-- Details Modal -->
<div id="detailsModal" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden z-[150] items-center justify-center p-4">
    <div class="glass w-full max-w-6xl rounded-[40px] flex flex-col shadow-2xl overflow-hidden max-h-[90vh]">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div class="flex-1">
                <input id="editPName" class="bg-transparent border-none text-2xl font-black italic text-white uppercase focus:ring-0 p-0 w-full mb-1">
                <p id="detProjectID" class="text-cyan-400 font-mono text-xs tracking-widest italic">ID: ---</p>
            </div>
            <div class="flex gap-3">
                <button id="saveUpdateBtn" onclick="saveProjectUpdate()" class="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-2 rounded-xl font-bold text-xs flex items-center gap-2 transition-all active:scale-95">
                    <i data-lucide="save" size="14"></i> Save Changes
                </button>
                <button id="deleteBtn" onclick="deleteProject()" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl font-bold text-xs transition-all active:scale-95">
                    <i data-lucide="trash-2" size="14"></i> Delete
                </button>
                <button onclick="toggleModal('detailsModal', false)" class="text-slate-400 hover:text-white p-2 glass rounded-full"><i data-lucide="x"></i></button>
            </div>
        </div>

        <div class="flex-1 p-8 overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="space-y-5">
                    <h5 class="text-cyan-500 text-[10px] font-black uppercase tracking-[3px]">Core Info</h5>
                    <div><label>Client Email</label><input type="email" id="editClientEmail"></div>
                    <div><label>Status</label><select id="editStatus"><option value="Pending">Pending</option><option value="InProgress">InProgress</option><option value="Review">Review</option><option value="Completed">Completed</option></select></div>
                </div>
                <div class="space-y-5">
                    <h5 class="text-cyan-500 text-[10px] font-black uppercase tracking-[3px]">Production Links</h5>
                    <div><label>Footage Link</label><input type="url" id="editFootage"></div>
                    <div><label>Final Files</label><input type="url" id="editFilesLink"></div>
                </div>
                <div class="space-y-5 bg-white/5 p-6 rounded-3xl border border-white/10">
                    <h5 class="text-orange-500 text-[10px] font-black uppercase tracking-[3px]">Management</h5>
                    <div><label>Revision Count</label><input type="number" id="editRevNum"></div>
                    <div><label>Editor Notes</label><textarea id="editEditorNotes" rows="2"></textarea></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbylKkKbbLkP8-M4_8Yi6eYFJF3V4gW4sLOeZ7sUyl1pCImSzFEGkFkdeEKnyhCYQgx8uA/exec";
    const ADMIN_EMAIL = "naimur582582@gmail.com"; 
    let ALL_PROJECTS = [];

    function handleCredentialResponse(response) {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        localStorage.setItem('studio_logged_in', 'true');
        localStorage.setItem('user_name', payload.name);
        localStorage.setItem('user_email', payload.email);
        location.reload();
    }

    async function initDashboard() {
        const loader = document.getElementById('loader');
        try {
            const res = await fetch(WEB_APP_URL);
            const response = await res.json();
            ALL_PROJECTS = response.data || [];
            renderUI(ALL_PROJECTS);
            calculateStats(ALL_PROJECTS);
        } catch (e) { 
            console.error(e); 
        } finally { 
            loader.classList.add('hidden'); 
        }
    }

    function renderUI(data) {
        const grid = document.getElementById('projectGrid');
        grid.innerHTML = data.map((p, i) => `
            <div onclick="showProjectDetails(${i})" class="glass glass-card p-8 rounded-[40px] border-l-4 border-transparent">
                <div class="flex justify-between mb-4">
                    <span class="text-[10px] font-mono text-cyan-400">ID: ${p[1] || '---'}</span>
                    <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-tighter status-${(p[10] || 'Pending').replace(/\s/g, '')}">${p[10] || 'Pending'}</span>
                </div>
                <h4 class="text-xl font-bold text-white italic mb-4 truncate">${p[3] || 'Untitled Project'}</h4>
                <div class="flex items-center gap-2">
                    <div class="progress-bar flex-grow"><div class="progress-fill" style="width: ${p[10] === 'Completed' ? '100%' : '45%'}"></div></div>
                    <span class="text-[10px] font-bold text-slate-500">${p[10] === 'Completed' ? '100%' : '45%'}</span>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function showProjectDetails(index) {
        const p = ALL_PROJECTS[index];
        const userEmail = (localStorage.getItem('user_email') || "").toLowerCase();
        
        document.getElementById('detProjectID').innerText = p[1];
        document.getElementById('editPName').value = p[3] || '';
        document.getElementById('editClientEmail').value = p[2] || '';
        document.getElementById('editStatus').value = p[10] || 'Pending';
        document.getElementById('editFootage').value = p[13] || '';
        document.getElementById('editFilesLink').value = p[14] || '';
        document.getElementById('editRevNum').value = p[23] || 0;
        document.getElementById('editEditorNotes').value = p[26] || '';

        const isAdmin = userEmail === ADMIN_EMAIL.toLowerCase();
        document.getElementById('saveUpdateBtn').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('deleteBtn').style.display = isAdmin ? 'flex' : 'none';
        document.getElementById('editPName').readOnly = !isAdmin;

        toggleModal('detailsModal', true);
    }

    async function saveProjectUpdate() {
        const btn = document.getElementById('saveUpdateBtn');
        const oldText = btn.innerHTML;
        btn.innerHTML = "Saving..."; 
        btn.disabled = true;

        const updateData = {
            action: "updateProject",
            projectID: document.getElementById('detProjectID').innerText,
            projectName: document.getElementById('editPName').value,
            clientEmail: document.getElementById('editClientEmail').value,
            status: document.getElementById('editStatus').value,
            footage: document.getElementById('editFootage').value,
            filesLink: document.getElementById('editFilesLink').value,
            revisionNumber: document.getElementById('editRevNum').value,
            editorNotes: document.getElementById('editEditorNotes').value
        };

        try {
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(updateData) 
            });
            alert("Changes Saved Successfully!");
            location.reload();
        } catch (err) { 
            alert("Save failed."); 
            btn.innerHTML = oldText; 
            btn.disabled = false; 
        }
    }

    async function deleteProject() {
        if(!confirm("DELETE THIS PROJECT FOREVER?")) return;
        const btn = document.getElementById('deleteBtn');
        btn.innerText = "Deleting..."; 
        btn.disabled = true;

        try {
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: "deleteProject", projectID: document.getElementById('detProjectID').innerText }) 
            });
            alert("Project Deleted.");
            location.reload();
        } catch (err) { 
            alert("Delete failed."); 
            btn.innerText = "Delete"; 
            btn.disabled = false; 
        }
    }

    function calculateStats(data) {
        document.getElementById('stat-active').innerText = data.filter(p => p[10] !== 'Completed').length;
        document.getElementById('stat-done').innerText = data.filter(p => p[10] === 'Completed').length;
        document.getElementById('stat-rev').innerText = data.filter(p => parseInt(p[23]) > 0).length;
    }

    function toggleModal(id, show) { 
        document.getElementById(id).style.display = show ? 'flex' : 'none'; 
    }

    function handleLogout() { 
        localStorage.clear(); 
        location.reload(); 
    }

    function checkAuth() {
        if (localStorage.getItem('studio_logged_in') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.opacity = '1';
            const name = localStorage.getItem('user_name');
            document.getElementById('userNameDisplay').innerText = name;
            document.getElementById('userAvatar').innerText = name.charAt(0);
            if(localStorage.getItem('user_email').toLowerCase() === ADMIN_EMAIL) {
                document.getElementById('userRoleDisplay').innerText = "ADMINISTRATOR";
            }
            initDashboard();
        }
    }
    window.onload = checkAuth;
</script>
</body>
</html>
