<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity OS | Motion Of Naimur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #050508; --card: #0f0f16; --primary: #3b82f6; --border: rgba(255,255,255,0.06); --text: #ffffff; --text-sec: #94a3b8; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        .container { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
        .p-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .p-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        /* Form Layout from Screenshot */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        .full { grid-column: span 2; }
        .c-input { width: 100%; padding: 12px; background: #15151e; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .c-label { font-size: 0.75rem; color: var(--text-sec); margin-bottom: 4px; display: block; }
        
        /* Tabs & Messages */
        .tab-btn { padding: 10px 20px; background: none; border: none; color: var(--text-sec); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .chat-box { height: 320px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #222; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 0.85rem; line-height: 1.4; }
        .b-admin { background: #222; border: 1px solid #333; align-self: flex-start; }
        .b-client { background: var(--primary); align-self: flex-end; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; justify-content: center; width: 100%; }
    </style>
</head>
<body>

    <nav style="display:flex; justify-content:space-between; align-items:center; padding: 1.2rem 5%; border-bottom: 1px solid var(--border); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); position: sticky; top:0; z-index:100;">
        <div style="font-weight:800; font-size:1.4rem; letter-spacing:1px;">MOTION OF NAIMUR <span style="font-weight:300; color:var(--text-sec);">OS</span></div>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="u-pic" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--primary);">
            <button onclick="logout()" style="background:#1a1a1a; color:white; border:1px solid #333; padding:8px 16px; border-radius:8px; cursor:pointer; font-size:0.8rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 style="font-size:1.8rem;">Your Productions</h1>
            <button onclick="createProject()" style="width:auto; padding: 12px 25px;" class="btn"><i data-lucide="plus"></i> New Project</button>
        </div>
        <div id="project-list" class="project-grid">Fetching your projects from cloud...</div>
    </div>

    <script>
        const API = "আপনার_গুগল_অ্যাপ_স্ক্রিপ্ট_ইউআরএল"; 
        const email = localStorage.getItem('clientEmail');

        async function sync() {
            try {
                const res = await fetch(`${API}?sheet=Projects&email=${email}`);
                const data = await res.json();
                render(data);
            } catch (e) {
                document.getElementById('project-list').innerHTML = "No projects found or connection error.";
            }
        }

        function render(projects) {
            if(!projects || projects.length === 0) {
                document.getElementById('project-list').innerHTML = "No active projects found for " + email;
                return;
            }
            document.getElementById('project-list').innerHTML = projects.map(p => `
                <div class="p-card" onclick="openProject('${p['Project ID']}')">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <span style="font-size:0.7rem; color:var(--primary); font-weight:bold; text-transform:uppercase; letter-spacing:1px;">${p.Status || 'Active'}</span>
                        <span style="font-size:0.7rem; color:var(--text-sec);">${p.Priority || 'Normal'} Priority</span>
                    </div>
                    <h3 style="margin:0 0 15px 0; font-size:1.2rem;">${p['Project Name']}</h3>
                    <div style="height:4px; background:#222; border-radius:10px; margin-bottom:15px;">
                        <div style="width:40%; height:100%; background:var(--primary); border-radius:10px;"></div>
                    </div>
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem;">
                        <span style="color:var(--text-sec);"><i data-lucide="calendar" size="14" style="vertical-align:middle; margin-right:5px;"></i> ${p.Deadline || 'No date'}</span>
                        <b style="color:#fff">৳ ${p['Budget (BDT)'] || '0'}</b>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openProject(id) {
            const res = await fetch(`${API}?sheet=Projects&email=${email}`);
            const all = await res.json();
            const p = all.find(x => x['Project ID'].toString() === id.toString());

            Swal.fire({
                title: p['Project Name'], width: '900px', background: '#050508', color: '#fff', showConfirmButton: false,
                html: `
                    <div style="display:flex; border-bottom:1px solid #222; margin-bottom:20px;">
                        <button class="tab-btn active" id="btn-det" onclick="switchTab('det')">Project Details</button>
                        <button class="tab-btn" id="btn-msg" onclick="switchTab('msg')">Revisions & Chat</button>
                    </div>
                    <div id="sec-det">
                        <div class="form-grid">
                            <div class="full"><label class="c-label">Footage Link</label><input class="c-input" value="${p['Footage Link']}" readonly></div>
                            <div><label class="c-label">Script Link</label><input class="c-input" value="${p['Script Link'] || ''}" readonly></div>
                            <div><label class="c-label">Client Website</label><input class="c-input" value="${p['Client Website'] || ''}" readonly></div>
                            <div><label class="c-label">Reference 1</label><input class="c-input" value="${p['Reference Link-1'] || ''}" readonly></div>
                            <div><label class="c-label">Reference 2</label><input class="c-input" value="${p['Reference Link-2'] || ''}" readonly></div>
                            <div class="full"><label class="c-label">Project Notes</label><textarea class="c-input" style="height:80px;" readonly>${p.Notes || ''}</textarea></div>
                            <a href="${p['Delivery Link'] || '#'}" target="_blank" class="btn full" style="background:#059669;">Access Delivery Files</a>
                        </div>
                    </div>
                    <div id="sec-msg" style="display:none;">
                        <div class="chat-box" id="chat-container">Loading conversation...</div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <input id="chat-input" placeholder="Type your revision request or message..." class="c-input">
                            <button onclick="sendMsg('${id}')" class="btn" style="width:80px;"><i data-lucide="send"></i></button>
                        </div>
                    </div>
                `
            });
            lucide.createIcons();
            loadMessages(id);
        }

        function switchTab(t) {
            document.getElementById('sec-det').style.display = t === 'det' ? 'block' : 'none';
            document.getElementById('sec-msg').style.display = t === 'msg' ? 'block' : 'none';
            document.getElementById('btn-det').classList.toggle('active', t === 'det');
            document.getElementById('btn-msg').classList.toggle('active', t === 'msg');
        }

        async function createProject() {
            const { value: f } = await Swal.fire({
                title: 'New Production Form', width: '800px', background: '#0f0f16', color: '#fff',
                html: `
                    <div class="form-grid">
                        <div class="full"><label class="c-label">Project Name*</label><input id="p-name" class="c-input"></div>
                        <div><label class="c-label">Footage Link</label><input id="p-foot" class="c-input" placeholder="http://"></div>
                        <div><label class="c-label">Script Link</label><input id="p-script" class="c-input" placeholder="http://"></div>
                        <div><label class="c-label">Reference Link-1</label><input id="p-ref1" class="c-input" placeholder="http://"></div>
                        <div><label class="c-label">Reference Link-2</label><input id="p-ref2" class="c-input" placeholder="http://"></div>
                        <div><label class="c-label">Client Website</label><input id="p-web" class="c-input" placeholder="http://"></div>
                        <div><label class="c-label">Deadline</label><input id="p-date" type="date" class="c-input"></div>
                        <div><label class="c-label">Contact Number</label><input id="p-num" type="number" class="c-input"></div>
                        <div><label class="c-label">Estimated Budget (BDT)</label><input id="p-budget" type="number" class="c-input"></div>
                        <div class="full"><label class="c-label">Additional Instructions / Notes</label><textarea id="p-note" class="c-input" style="height:80px;"></textarea></div>
                    </div>
                `,
                confirmButtonText: 'Launch Project',
                preConfirm: () => ({
                    name: document.getElementById('p-name').value,
                    foot: document.getElementById('p-foot').value,
                    script: document.getElementById('p-script').value,
                    ref1: document.getElementById('p-ref1').value,
                    ref2: document.getElementById('p-ref2').value,
                    web: document.getElementById('p-web').value,
                    date: document.getElementById('p-date').value,
                    num: document.getElementById('p-num').value,
                    budget: document.getElementById('p-budget').value,
                    note: document.getElementById('p-note').value
                })
            });

            if(f && f.name) {
                Swal.fire({ title: 'Syncing with Sheet...', didOpen: () => Swal.showLoading() });
                await fetch(API, { method: 'POST', body: JSON.stringify({
                    action: "add", sheet: "Projects",
                    "Project Name": f.name, "Client Email": email, "Footage Link": f.foot,
                    "Script Link": f.script, "Reference Link-1": f.ref1, "Reference Link-2": f.ref2,
                    "Client Website": f.web, "Deadline": f.date, "Number": f.num,
                    "Budget (BDT)": f.budget, "Notes": f.note, "Status": "Reviewing"
                })});
                Swal.fire('Success', 'Project added. Refreshing list...', 'success');
                sync();
            }
        }

        async function loadMessages(id) {
            const res = await fetch(`${API}?sheet=Messages&pId=${id}`);
            const msgs = await res.json();
            document.getElementById('chat-container').innerHTML = msgs.map(m => `
                <div class="bubble ${m.From === email ? 'b-client' : 'b-admin'}">
                    <div style="font-size:0.65rem; opacity:0.6; margin-bottom:4px;">${m.From === email ? 'You' : 'Naimur'}</div>
                    ${m['Message Text']}
                </div>
            `).join('') || '<div style="text-align:center; color:gray; margin-top:100px;">Start a conversation about this project.</div>';
        }

        async function sendMsg(id) {
            const text = document.getElementById('chat-input').value; if(!text) return;
            document.getElementById('chat-input').value = '';
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: "add", sheet: "Messages", "Project ID": id, "From": email, "Message Text": text })});
            loadMessages(id);
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        document.getElementById('u-pic').src = localStorage.getItem('clientPic');
        sync();
    </script>
</body>
</html>
