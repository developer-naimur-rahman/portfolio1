<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Of Naimur | Agency OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060b; --glass: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08); --accent: #00f2ff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #f8fafc; min-height: 100vh; }
        .glass { background: var(--glass); backdrop-filter: blur(16px); border:1px solid var(--border); }
        .glass-card { transition: all 0.4s ease; cursor: pointer; }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 20px 40px -20px rgba(0,242,255,0.2); }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius:3px; overflow:hidden; }
        .progress-fill { height:100%; background: linear-gradient(90deg,#00f2ff,#0066ff); transition: width 1s ease; }
        
        .status-Pending { color:#f59e0b; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
        .status-InProgress { color:#3b82f6; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
        .status-Completed { color:#10b981; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
        .status-URGENT { color:#ef4444; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .loading-spinner { width:40px; height:40px; border:3px solid rgba(0,242,255,0.1); border-radius:50%; border-top-color: var(--accent); animation:spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        input, select, textarea { background: rgba(255,255,255,0.05); border:1px solid var(--border); outline:none; color:white; padding:12px; border-radius:16px; width: 100%; }
        input:focus { border-color: var(--accent); }
    </style>
</head>
<body class="flex">

<aside class="w-72 glass border-r border-white/5 p-8 flex flex-col fixed h-full z-50">
    <div class="mb-12">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 bg-cyan-500 rounded-lg flex items-center justify-center font-bold text-black italic">M</div>
            <h1 class="text-xl font-bold text-white tracking-tighter italic">MOTION OF NAIMUR</h1>
        </div>
        <p class="text-[10px] text-slate-500 uppercase tracking-[4px] ml-1 font-semibold">Production Console</p>
    </div>
    <nav class="space-y-3 flex-grow text-sm">
        <div onclick="location.reload()" class="flex items-center gap-3 p-4 glass rounded-2xl text-cyan-400 cursor-pointer">
            <i data-lucide="layout-grid" size="18"></i> Dashboard
        </div>
    </nav>
    <div class="pt-8 border-t border-white/5">
        <div class="flex items-center gap-3 p-2 text-xs">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-600 flex items-center justify-center font-bold text-white shadow-lg text-lg">N</div>
            <div class="overflow-hidden">
                <p class="font-bold text-white truncate">Naimur Rahman</p>
                <p class="text-slate-500 uppercase font-bold tracking-wider">Agency Owner</p>
            </div>
        </div>
    </div>
</aside>

<main class="ml-72 p-12 w-full max-w-[1600px]">
    <header class="flex justify-between items-end mb-12">
        <div>
            <h2 class="text-4xl font-extrabold tracking-tight text-white mb-2 italic">Studio Hub<span class="text-cyan-500">.</span></h2>
            <p class="text-slate-500 font-medium flex items-center gap-2 text-sm">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Production Pipeline Active
            </p>
        </div>
        <button onclick="toggleModal('pModal', true)" class="bg-cyan-500 hover:bg-cyan-400 text-black px-8 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-lg shadow-cyan-500/20 active:scale-95 transition-all">
            <i data-lucide="plus-circle" size="20"></i> Launch Production
        </button>
    </header>

    <div class="grid grid-cols-4 gap-6 mb-16">
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Active</p><h3 id="stat-active" class="text-4xl font-bold italic text-white">0</h3></div>
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Delivered</p><h3 id="stat-done" class="text-4xl font-bold text-green-400 italic">0</h3></div>
        <div class="glass p-8 rounded-[32px]"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Revisions</p><h3 id="stat-rev" class="text-4xl font-bold text-orange-400 italic">0</h3></div>
        <div class="glass p-8 rounded-[32px] border-b-4 border-cyan-500/30"><p class="text-slate-500 text-[11px] font-bold uppercase mb-3">Revenue</p><h3 id="stat-revenue" class="text-4xl font-bold text-cyan-400 italic">BDT 0</h3></div>
    </div>

    <div id="loader" class="flex flex-col items-center justify-center py-32">
        <div class="loading-spinner mb-6"></div>
        <p class="text-slate-500 text-sm italic">Connecting to Studio Database...</p>
    </div>
    <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
</main>

<!-- ADD PROJECT MODAL -->
<div id="pModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden z-[100] items-center justify-center p-4 overflow-y-auto">
    <div class="glass w-full max-w-4xl p-10 my-10 rounded-[40px] relative">
        <div class="flex justify-between items-start mb-10">
            <h3 class="text-3xl font-bold italic text-white tracking-tighter uppercase">New Production</h3>
            <button onclick="toggleModal('pModal', false)" class="text-slate-400 hover:text-white"><i data-lucide="x"></i></button>
        </div>
        <form id="projectForm" class="grid grid-cols-2 gap-8">
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Project Name</label><input type="text" id="pName" required></div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Client Email</label><input type="email" id="pClientEmail" required></div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Editor</label>
                    <select id="pEditor" required>
                        <option value="">Select Editor</option>
                        <option value="Naimur Rahman|naimur582582@gmail.com">Naimur Rahman</option>
                        <option value="Shafin|shafin@mail.com">Shafin</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Category</label>
                    <select id="pCategory"><option>YouTube</option><option>Reels</option><option>Real Estate</option><option>Ads</option></select>
                </div>
            </div>
            <div class="space-y-4">
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Deadline</label><input type="date" id="pDeadline" required></div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Priority</label>
                    <select id="pPriority"><option>Normal</option><option>High</option><option value="URGENT">URGENT</option></select>
                </div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Budget (BDT)</label><input type="number" id="pBudget" value="0"></div>
                <div><label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Footage Link</label><input type="url" id="pFootage"></div>
                <button type="submit" id="submitBtn" class="w-full bg-cyan-500 text-black py-4 rounded-2xl font-black uppercase tracking-widest hover:bg-cyan-400 mt-4">Launch Project</button>
            </div>
        </form>
    </div>
</div>

<!-- DETAILS MODAL (FIXED IDS) -->
<div id="detailsModal" class="fixed inset-0 bg-black/95 backdrop-blur-2xl hidden z-[150] items-center justify-center p-4">
    <div class="glass w-full max-w-5xl rounded-[40px] flex flex-col shadow-2xl overflow-hidden max-h-[90vh]">
        <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5">
            <div class="flex-1">
                <input id="editPName" class="bg-transparent border-none text-2xl font-black italic text-white uppercase focus:ring-0 p-0 w-full mb-1" placeholder="Project Name">
                <p id="detProjectID" class="text-cyan-400 font-mono text-xs tracking-widest italic">ID: ---</p>
            </div>
            <div class="flex gap-3">
                <button onclick="saveProjectUpdate()" class="bg-cyan-500 hover:bg-cyan-400 text-black px-6 py-2 rounded-xl font-bold text-xs flex items-center gap-2 transition-all active:scale-95">
                    <i data-lucide="refresh-cw" size="14"></i> Update Project
                </button>
                <button onclick="deleteProject()" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded-xl font-bold text-xs transition-all active:scale-95">
                    <i data-lucide="trash-2" size="14"></i> Delete
                </button>
                <button onclick="toggleModal('detailsModal', false)" class="text-slate-400 hover:text-white p-2"><i data-lucide="x"></i></button>
            </div>
        </div>

        <div class="flex flex-1 p-8 gap-8 overflow-y-auto">
            <div class="w-1/2 space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Client Email (C)</label>
                    <input type="email" id="editClientEmail" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Editor (I)</label>
                    <select id="editEditor" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                        <option value="Naimur Rahman">Naimur Rahman</option>
                        <option value="Shafin">Shafin</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Status (K)</label>
                    <select id="editStatus" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Review">Review</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Footage Link (N)</label>
                    <input type="url" id="editFootage" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                </div>
            </div>

            <div class="w-1/2 space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Script Link (P)</label>
                    <input type="url" id="editScript" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Deadline (U)</label>
                    <input type="date" id="editDeadline" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Revisions (X)</label>
                        <input type="number" id="editRev" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-2">Budget (AC)</label>
                        <input type="number" id="editBudget" class="w-full bg-white/5 border-white/10 rounded-xl text-white">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbylKkKbbLkP8-M4_8Yi6eYFJF3V4gW4sLOeZ7sUyl1pCImSzFEGkFkdeEKnyhCYQgx8uA/exec";
    let ALL_PROJECTS = [];

    function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }

    async function initDashboard() {
        const loader = document.getElementById('loader');
        const grid = document.getElementById('projectGrid');
        loader.classList.remove('hidden'); 
        grid.innerHTML = '';
        try {
            const res = await fetch(WEB_APP_URL);
            const response = await res.json();
            ALL_PROJECTS = response.data || [];
            renderUI(ALL_PROJECTS);
        } catch (err) {
            grid.innerHTML = `<div class="col-span-full py-20 text-center"><p class="text-red-500">Data Sync Failed.</p></div>`;
        } finally { loader.classList.add('hidden'); }
    }

    function renderUI(data) {
        const grid = document.getElementById('projectGrid');
        if (!data || data.length === 0) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-slate-500 italic'>No projects found.</p>"; return; }
        
        grid.innerHTML = data.map((p, index) => {
            const status = (p[10] || 'Pending').replace(/\s+/g, '');
            const priority = p[11] || 'Normal';
            const revCount = parseInt(p[23] || 0);
            const deadline = p[20] ? new Date(p[20]).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) : 'N/A';
            
            return `
                <div onclick="showProjectDetails(${index})" class="glass glass-card p-8 rounded-[40px] border-l-4 ${priority === 'URGENT' ? 'border-red-500' : 'border-transparent'}">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-mono text-cyan-400 tracking-widest">${p[1]}</span>
                            <h4 class="text-xl font-bold text-white italic mt-1 truncate w-48">${p[3]}</h4>
                        </div>
                        <span class="status-${status} px-4 py-1.5 rounded-xl text-[10px] font-black uppercase italic">${p[10] || 'Pending'}</span>
                    </div>
                    <div class="flex gap-4 text-slate-400 text-[11px] font-bold mb-6">
                        <span class="flex items-center gap-1"><i data-lucide="layers" size="12"></i> ${p[4] || 'Video'}</span>
                        <span class="flex items-center gap-1 text-orange-400"><i data-lucide="refresh-cw" size="12"></i> ${revCount}</span>
                        <span class="flex items-center gap-1"><i data-lucide="calendar" size="12"></i> ${deadline}</span>
                    </div>
                    <div class="progress-bar mb-3">
                        <div class="progress-fill" style="width: ${p[10] === 'Completed' ? '100%' : (revCount * 33) + '%'}"></div>
                    </div>
                    <p class="text-[10px] uppercase font-bold text-slate-500 italic">View / Edit Details</p>
                </div>
            `;
        }).join('');
        lucide.createIcons();
        updateStats(data);
    }

    // পপআপে ডাটা লোড করার ফাংশন
    function showProjectDetails(index) {
        const p = ALL_PROJECTS[index];
        if(!p) return;

        // সরাসরি ইনপুট ফিল্ডের ভ্যালু সেট করা
        document.getElementById('detProjectID').innerText = p[1] || 'MN-000';
        document.getElementById('editPName').value = p[3] || '';
        document.getElementById('editStatus').value = (p[10] || 'Pending').replace(/\s+/g, '');
        document.getElementById('editRev').value = p[23] || 0;
        document.getElementById('editBudget').value = p[28] || 0;
        document.getElementById('editFootage').value = p[13] || '';
        document.getElementById('editScript').value = p[15] || '';
        document.getElementById('editClientEmail').value = p[2] || '';
        document.getElementById('editEditor').value = p[8] || '';

        // ডেট ফরম্যাট ঠিক করা (YYYY-MM-DD)
        if(p[20]) {
            const date = new Date(p[20]);
            document.getElementById('editDeadline').value = date.toISOString().split('T')[0];
        }

        lucide.createIcons();
        toggleModal('detailsModal', true);
    }

    async function saveProjectUpdate() {
        const btn = document.getElementById('saveUpdateBtn');
        const originalText = btn.innerText;
        btn.innerText = "Updating...";
        btn.disabled = true;

        const formData = {
            action: "updateProject",
            projectID: document.getElementById('detProjectID').innerText,
            projectName: document.getElementById('editPName').value,
            clientEmail: document.getElementById('editClientEmail').value,
            status: document.getElementById('editStatus').value,
            revisions: document.getElementById('editRev').value,
            budget: document.getElementById('editBudget').value,
            editor: document.getElementById('editEditor').value,
            footage: document.getElementById('editFootage').value,
            script: document.getElementById('editScript').value,
            deadline: document.getElementById('editDeadline').value
        };

        try {
            const response = await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify(formData) 
            });
            alert("Project Update Sent!");
            toggleModal('detailsModal', false);
            setTimeout(initDashboard, 1500);
        } catch (err) {
            console.error(err);
            alert("Error updating. Refreshing...");
            location.reload();
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    async function deleteProject() {
        if(!confirm("Are you sure? This cannot be undone!")) return;
        const projectID = document.getElementById('detProjectID').innerText;
        try {
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                body: JSON.stringify({action: "deleteProject", projectID: projectID}) 
            });
            alert("Delete Request Sent.");
            toggleModal('detailsModal', false);
            setTimeout(initDashboard, 1500);
        } catch (err) { location.reload(); }
    }

    function updateStats(data) {
        document.getElementById('stat-active').innerText = data.filter(p => p[10] !== 'Completed').length;
        document.getElementById('stat-done').innerText = data.filter(p => p[10] === 'Completed').length;
        document.getElementById('stat-rev').innerText = data.reduce((acc, p) => acc + (parseInt(p[23] || 0)), 0);
        const totalRev = data.reduce((acc, p) => acc + (parseFloat(p[28] || 0)), 0);
        document.getElementById('stat-revenue').innerText = "BDT " + totalRev.toLocaleString();
    }

    document.getElementById('projectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Launching...";
        btn.disabled = true;
        const editorData = document.getElementById('pEditor').value.split('|');
        const formData = {
            action: "addProject",
            projectName: document.getElementById('pName').value,
            clientEmail: document.getElementById('pClientEmail').value,
            assignedEditor: editorData[0],
            editorEmail: editorData[1],
            category: document.getElementById('pCategory').value,
            deadline: document.getElementById('pDeadline').value,
            priority: document.getElementById('pPriority').value,
            budget: document.getElementById('pBudget').value,
            footage: document.getElementById('pFootage').value
        };
        try {
            await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(formData) });
            alert("Launched!");
            toggleModal('pModal', false);
            setTimeout(initDashboard, 2000);
        } catch (err) { location.reload(); }
    });

    window.onload = initDashboard;
</script>
</body>
</html>
