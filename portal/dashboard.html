<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity OS | Motion Of Naimur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #050508; --card: #0f0f16; --primary: #3b82f6; --border: rgba(255,255,255,0.06); --text: #ffffff; --text-sec: #94a3b8; --success: #059669; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; border-bottom: 1px solid var(--border); background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); position: sticky; top:0; z-index: 100; }
        .container { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .p-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .p-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        #project-view { display: none; background: var(--bg); min-height: 100vh; width: 100%; position: absolute; top: 0; left: 0; z-index: 200; padding: 2rem 5%; box-sizing: border-box; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        .full { grid-column: span 2; }
        .c-input { width: 100%; padding: 12px; background: #15151e; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.9rem; margin-bottom: 5px; }
        .c-label { font-size: 0.75rem; color: var(--text-sec); margin-bottom: 5px; display: block; font-weight: 600; text-transform: uppercase; }
        
        .tabs { display: flex; gap: 20px; border-bottom: 1px solid var(--border); margin-bottom: 25px; }
        .tab-btn { padding: 12px 20px; background: none; border: none; color: var(--text-sec); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 600; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }

        .chat-box { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; border: 1px solid #222; margin-bottom: 10px; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .b-admin { background: #222; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .b-client { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; justify-content: center; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .back-btn { background: none; border: 1px solid #333; color: var(--text-sec); padding: 8px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight:800; font-size:1.4rem; letter-spacing:-1px;">MOTION OF NAIMUR OS</div>
        <div style="display:flex; align-items:center; gap:15px;">
            <img id="u-pic" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--primary);">
            <button onclick="logout()" style="background:#1a1a1a; color:white; border:1px solid #333; padding:8px 16px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>
    </nav>

    <div id="main-dashboard" class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h1 id="welcome-title">Loading...</h1>
            <button id="client-add-btn" onclick="createProject()" class="btn"><i data-lucide="plus"></i> New Project</button>
        </div>
        <div id="project-list" class="project-grid">Syncing with Google Sheets...</div>
    </div>

    <div id="project-view">
        <button class="back-btn" onclick="closeView()"><i data-lucide="arrow-left"></i> Back</button>
        <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom:20px;">
            <h1 id="v-title" style="margin:0;">Project</h1>
            <div id="v-status" style="color:var(--primary); font-weight:800; background:rgba(59,130,246,0.1); padding:6px 18px; border-radius:20px; font-size:0.8rem;">STATUS</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="tab-det-btn" onclick="switchTab('sec-det')">Details</button>
            <button class="tab-btn" id="tab-msg-btn" onclick="switchTab('sec-msg')">Messages & Revisions</button>
        </div>

        <div id="sec-det" class="tab-content" style="display:block;">
            <div id="admin-assign-zone"></div>
            <div class="form-grid" id="detail-inputs"></div>
            <div id="delivery-zone"></div>
            <div id="admin-danger-zone"></div>
        </div>

        <div id="sec-msg" class="tab-content">
            <div class="chat-box" id="chat-container"></div>
            <div style="display:flex; gap:10px;">
                <input id="chat-input" placeholder="Write message or revision notes..." class="c-input">
                <button id="send-btn" class="btn">Send <i data-lucide="send" size="16"></i></button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbylKkKbbLkP8-M4_8Yi6eYFJF3V4gW4sLOeZ7sUyl1pCImSzFEGkFkdeEKnyhCYQgx8uA/exec"; 
        const userEmail = localStorage.getItem('clientEmail');
        const ADMIN_EMAIL = "naimur582582@gmail.com";
        const EDITORS = ["mahabur1in4@gmail.com", "juel@gmail.com"];
        const isAdmin = (userEmail === ADMIN_EMAIL);
        const isEditor = EDITORS.includes(userEmail);

        let cache = [];

        async function sync() {
            try {
                const res = await fetch(`${API}?sheet=Projects&email=${userEmail}`);
                cache = await res.json();
                renderDashboard();
            } catch(e) { console.error(e); }
        }

        function renderDashboard() {
            document.getElementById('welcome-title').innerText = isAdmin ? "Admin Panel" : (isEditor ? "Editor Portal" : "Client Dashboard");
            if(!cache.length) { document.getElementById('project-list').innerHTML = "No projects found."; return; }
            
            document.getElementById('project-list').innerHTML = cache.map(p => `
                <div class="p-card" onclick="openView('${p['Project ID']}')">
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span style="color:var(--primary); font-weight:bold; font-size:0.7rem;">${p.Status || 'Review'}</span>
                        <span style="color:var(--text-sec); font-size:0.7rem;">#${p['Project ID']}</span>
                    </div>
                    <h3 style="margin:0 0 10px 0;">${p['Project Name']}</h3>
                    <div style="font-size:0.8rem; color:var(--text-sec); display:flex; justify-content:space-between;">
                        <span>Deadline: ${p.Deadline || 'N/A'}</span>
                        <span>৳ ${p['Budget (BDT)'] || '0'}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openView(id) {
            const p = cache.find(x => x['Project ID'].toString() === id.toString());
            document.getElementById('v-title').innerText = p['Project Name'];
            document.getElementById('v-status').innerText = p.Status;

            if (isAdmin) {
                document.getElementById('admin-assign-zone').innerHTML = `
                    <div style="background:rgba(59,130,246,0.1); padding:15px; border-radius:12px; margin-bottom:20px; border:1px dashed var(--primary);">
                        <label class="c-label">Assign Editor</label>
                        <div style="display:flex; gap:10px;">
                            <select id="assign-editor-select" class="c-input">
                                <option value="">Select Editor</option>
                                <option value="mahabur1in4@gmail.com" ${p['Assigned Editor'] === 'mahabur1in4@gmail.com' ? 'selected' : ''}>Mahabur</option>
                                <option value="juel@gmail.com" ${p['Assigned Editor'] === 'juel@gmail.com' ? 'selected' : ''}>Juel</option>
                            </select>
                            <button onclick="assignNow('${id}')" class="btn">Assign</button>
                        </div>
                    </div>
                `;
            }

            document.getElementById('detail-inputs').innerHTML = `
                <div class="full"><label class="c-label">Footage Link</label><input class="c-input" value="${p['Footage Link']}" readonly></div>
                <div><label class="c-label">Script</label><input class="c-input" value="${p.Script || ''}" readonly></div>
                <div><label class="c-label">Script Link</label><input class="c-input" value="${p['Script Link'] || ''}" readonly></div>
                <div><label class="c-label">Ref Link 1</label><input class="c-input" value="${p['Reference Link-1'] || ''}" readonly></div>
                <div><label class="c-label">Ref Link 2</label><input class="c-input" value="${p['Reference Link-2'] || ''}" readonly></div>
                <div><label class="c-label">Deadline</label><input class="c-input" value="${p.Deadline || ''}" readonly></div>
                <div><label class="c-label">Budget</label><input class="c-input" value="${p['Budget (BDT)'] || ''}" readonly></div>
                <div class="full"><label class="c-label">Notes</label><textarea class="c-input" readonly>${p.Notes || ''}</textarea></div>
            `;

            if (isAdmin || isEditor) {
                document.getElementById('delivery-zone').innerHTML = `
                    <div style="background:rgba(5,150,105,0.1); padding:15px; border-radius:12px; margin-top:20px;">
                        <label class="c-label">Delivery Link</label>
                        <div style="display:flex; gap:10px;">
                            <input id="dev-link" class="c-input" value="${p['Delivery Link'] || ''}" placeholder="Paste link">
                            <button onclick="updateDevLink('${id}')" class="btn" style="background:var(--success);">Update</button>
                        </div>
                    </div>
                `;
            } else if (p['Delivery Link']) {
                document.getElementById('delivery-zone').innerHTML = `<a href="${p['Delivery Link']}" target="_blank" class="btn full" style="background:var(--success); margin-top:20px;">Download Final File</a>`;
            }

            document.getElementById('main-dashboard').style.display = 'none';
            document.getElementById('project-view').style.display = 'block';
            document.getElementById('send-btn').onclick = () => sendMsg(id);
            loadMessages(id);
            lucide.createIcons();
        }

        async function createProject() {
            const { value: f } = await Swal.fire({
                title: 'New Production Form',
                width: '600px', background: '#0f0f16', color: '#fff',
                html: `
                    <div class="form-grid">
                        <div class="full"><label class="c-label">Project Name*</label><input id="p-name" class="c-input"></div>
                        <div class="full"><label class="c-label">Footage Link</label><input id="p-foot" class="c-input" value="http://"></div>
                        <div class="full"><label class="c-label">Script</label><input id="p-script" class="c-input"></div>
                        <div class="full"><label class="c-label">Script Link</label><input id="p-script-l" class="c-input" value="http://"></div>
                        <div><label class="c-label">Ref Link 1</label><input id="p-ref1" class="c-input" value="http://"></div>
                        <div><label class="c-label">Ref Link 2</label><input id="p-ref2" class="c-input" value="http://"></div>
                        <div><label class="c-label">Deadline</label><input id="p-date" type="date" class="c-input"></div>
                        <div><label class="c-label">Budget (BDT)</label><input id="p-budget" type="number" class="c-input"></div>
                        <div class="full"><label class="c-label">Notes</label><textarea id="p-note" class="c-input"></textarea></div>
                    </div>
                `,
                preConfirm: () => ({
                    name: document.getElementById('p-name').value,
                    foot: document.getElementById('p-foot').value,
                    script: document.getElementById('p-script').value,
                    scriptL: document.getElementById('p-script-l').value,
                    ref1: document.getElementById('p-ref1').value,
                    ref2: document.getElementById('p-ref2').value,
                    date: document.getElementById('p-date').value,
                    budget: document.getElementById('p-budget').value,
                    note: document.getElementById('p-note').value
                })
            });

            if(f && f.name) {
                Swal.fire({title: 'Submitting...', didOpen: () => Swal.showLoading()});
                await fetch(API, { method: 'POST', body: JSON.stringify({
                    action: "add", sheet: "Projects", 
                    "Project Name": f.name, "Client Email": userEmail, "Footage Link": f.foot, 
                    "Script": f.script, "Script Link": f.scriptL, "Reference Link-1": f.ref1, 
                    "Reference Link-2": f.ref2, "Deadline": f.date, "Budget (BDT)": f.budget, 
                    "Notes": f.note, "Status": "Review"
                })});
                Swal.fire('Success', 'Project Added!', 'success');
                sync();
            }
        }

        async function loadMessages(id) {
            const container = document.getElementById('chat-container');
            container.innerHTML = "Loading...";
            try {
                const res = await fetch(`${API}?sheet=Messages&pId=${id}`);
                const msgs = await res.json();
                container.innerHTML = msgs.map(m => `
                    <div class="bubble ${m.From === userEmail ? 'b-client' : 'b-admin'}">
                        <div style="font-size:0.6rem; opacity:0.7; margin-bottom:3px;">${m.From === ADMIN_EMAIL ? 'Naimur' : (m.From === userEmail ? 'You' : 'Editor')}</div>
                        ${m['Message Text']}
                    </div>
                `).join('') || "No messages yet.";
                container.scrollTop = container.scrollHeight;
            } catch(e) { container.innerHTML = "Error loading messages."; }
        }

        async function sendMsg(id) {
            const input = document.getElementById('chat-input');
            const text = input.value.trim(); 
            if(!text) return;
            
            input.disabled = true;
            await fetch(API, { method: 'POST', body: JSON.stringify({ 
                action: "add", sheet: "Messages", 
                "Project ID": id, "From": userEmail, "Message Text": text, "Client Email": userEmail 
            })});
            input.value = '';
            input.disabled = false;
            loadMessages(id);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(tabId === 'sec-det') document.getElementById('tab-det-btn').classList.add('active');
            else document.getElementById('tab-msg-btn').classList.add('active');
        }

        async function assignNow(id) {
            const ed = document.getElementById('assign-editor-select').value;
            if(!ed) return;
            Swal.fire({title: 'Updating...', didOpen: () => Swal.showLoading()});
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: "update", sheet: "Projects", id: id, updates: { "Assigned Editor": ed, "Status": "In Progress" }})});
            Swal.fire('Success', 'Assigned!', 'success');
            sync();
        }

        async function updateDevLink(id) {
            const link = document.getElementById('dev-link').value;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: "update", sheet: "Projects", id: id, updates: { "Delivery Link": link, "Status": "Delivered" }})});
            Swal.fire('Success', 'Link Saved!', 'success');
            sync();
        }

        function closeView() { document.getElementById('main-dashboard').style.display = 'block'; document.getElementById('project-view').style.display = 'none'; }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        document.getElementById('u-pic').src = localStorage.getItem('clientPic');
        sync();
    </script>
</body>
</html>
