<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Portal | Motion Of Naimur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --bg: #050508; --card: #0f0f16; --primary: #3b82f6; 
            --accent: #a855f7; --border: rgba(255,255,255,0.06); 
            --text: #ffffff; --text-sec: #94a3b8;
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); }
        
        /* Layout */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; background: rgba(5,5,8,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .container { padding: 2rem 5%; max-width: 1400px; margin: 0 auto; }
        
        /* Stats Card */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid var(--border); transition: 0.3s; }
        .stat-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .stat-card h2 { margin: 10px 0 0; font-size: 2.2rem; }
        .stat-card p { color: var(--text-sec); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Project Cards */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        .p-card { background: var(--card); border-radius: 30px; padding: 30px; border: 1px solid var(--border); cursor: pointer; transition: 0.4s; position: relative; }
        .p-card:hover { border-color: var(--primary); box-shadow: 0 20px 40px rgba(59,130,246,0.1); }
        
        .status-pill { padding: 6px 14px; border-radius: 100px; font-size: 0.7rem; font-weight: 700; background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .progress-container { height: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; margin: 25px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: 1s; }

        /* Chat */
        .chat-area { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 20px; padding: 20px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.9rem; line-height: 1.5; }
        .b-admin { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
        .b-client { background: #222; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* UI Elements */
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .btn:hover { opacity: 0.8; transform: scale(0.98); }
        .search-input { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); padding: 14px 20px; border-radius: 15px; color: white; }
    </style>
</head>
<body>

    <nav>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="background:var(--primary); width:42px; height:42px; border-radius:12px; display:grid; place-items:center;"><i data-lucide="clapperboard" color="white" size="22"></i></div>
            <b style="font-size:1.3rem; letter-spacing:1px;">MOTION OF NAIMUR <span style="font-weight:300; color:var(--text-sec);">OS</span></b>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <div id="admin-tag" class="status-pill" style="display:none; color:var(--accent); border-color:var(--accent);">GOD MODE</div>
            <img id="u-pic" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--primary); object-fit:cover;">
            <button onclick="logout()" class="btn" style="background:#1a1a1a; padding:8px 15px;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid" id="stats">
            </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; flex-wrap:wrap; gap:15px;">
            <input type="text" id="search" class="search-input" placeholder="Search projects or clients..." onkeyup="filter()">
            <button onclick="createProject()" class="btn"><i data-lucide="plus"></i> New Project</button>
        </div>

        <div id="project-list" class="project-grid">
            </div>
    </div>

    <script>
        const API = "আপনার_স্ক্রিপ্ট_ইউআরএল_এখানে_বসান"; 
        const email = localStorage.getItem('clientEmail');
        const isAdmin = (email === "naimur582582@gmail.com");
        let cache = [];

        if(isAdmin) document.getElementById('admin-tag').style.display = 'block';

        async function sync() {
            const res = await fetch(`${API}?sheet=Projects&email=${email}`);
            cache = await res.json();
            render();
        }

        function render() {
            // Stats logic
            const total = cache.length;
            const revenue = cache.reduce((s, p) => s + Number(p['Budget (BDT)'] || 0), 0);
            const active = cache.filter(p => p.Status !== 'Completed').length;

            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><p>Total Projects</p><h2>${total}</h2></div>
                <div class="stat-card"><p>Active Orders</p><h2>${active}</h2></div>
                ${isAdmin ? `<div class="stat-card"><p>Total Revenue</p><h2 style="color:var(--success)">৳${revenue}</h2></div>` : ''}
            `;

            // List logic
            document.getElementById('project-list').innerHTML = cache.map(p => `
                <div class="p-card" onclick="openDetails('${p['Project ID']}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="status-pill">${p.Status}</span>
                        <b style="color:#4ade80;">৳${p['Budget (BDT)']}</b>
                    </div>
                    <h2 style="margin:20px 0 8px;">${p['Project Name']}</h2>
                    <p style="color:var(--text-sec); font-size:0.75rem;">UID: ${p['Project ID']}</p>
                    
                    <div class="progress-container"><div class="progress-bar" style="width:${p.Progress || 10}%"></div></div>
                    
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--text-sec);">
                        <span><i data-lucide="clock" size="14"></i> ${p.Deadline}</span>
                        <span>${p['Payment Status']}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openDetails(id) {
            const p = cache.find(x => x['Project ID'] === id);
            Swal.fire({
                title: p['Project Name'],
                width: '1000px', background: '#050508', color: '#fff', showConfirmButton: false,
                html: `
                    <div style="display:grid; grid-template-columns: 320px 1fr; gap:25px; text-align:left;">
                        <div style="background:#0f0f16; padding:25px; border-radius:25px; border:1px solid #222;">
                            <p style="color:var(--text-sec); font-size:0.7rem; margin-bottom:15px;">PRODUCTION ASSETS</p>
                            <a href="${p['Footage Link']}" target="_blank" class="btn" style="background:#222; margin-bottom:10px; width:100%"><i data-lucide="video"></i> Raw Footage</a>
                            <a href="${p['Delivery Link']}" target="_blank" class="btn" style="width:100%"><i data-lucide="download"></i> Final Delivery</a>
                            
                            <hr style="border:0; border-top:1px solid #222; margin:25px 0;">
                            
                            ${isAdmin ? `
                                <label style="font-size:0.7rem; color:var(--text-sec);">UPDATE STATUS</label>
                                <select id="u-status" style="width:100%; padding:12px; background:#1a1a1a; color:white; border-radius:10px; margin:10px 0;">
                                    <option ${p.Status==='Order Placed'?'selected':''}>Order Placed</option>
                                    <option ${p.Status==='Editing'?'selected':''}>Editing</option>
                                    <option ${p.Status==='Completed'?'selected':''}>Completed</option>
                                </select>
                                <label style="font-size:0.7rem; color:var(--text-sec);">PROGRESS (%)</label>
                                <input id="u-prog" type="number" value="${p.Progress}" style="width:100%; padding:12px; background:#1a1a1a; color:white; border-radius:10px; margin:10px 0;">
                                <button onclick="update('${id}')" class="btn" style="width:100%; justify-content:center; background:var(--accent)">Save Changes</button>
                                <button onclick="del('${id}')" style="color:#ef4444; background:none; border:none; width:100%; margin-top:15px; cursor:pointer;">Delete Project</button>
                            ` : `
                                <div style="padding:15px; background:rgba(59,130,246,0.1); border-radius:15px; font-size:0.85rem;">
                                    <b>Note:</b> ${p.Notes || 'No notes yet.'}
                                </div>
                            `}
                        </div>
                        <div>
                            <div class="chat-area" id="chat">Loading...</div>
                            <div style="display:flex; gap:10px; margin-top:15px;">
                                <input id="msg" placeholder="Message Naimur..." style="flex:1; background:#1a1a1a; border:1px solid #222; color:white; padding:15px; border-radius:15px;">
                                <button onclick="send('${id}', '${p['Client Email']}')" class="btn"><i data-lucide="send"></i></button>
                            </div>
                        </div>
                    </div>
                `
            });
            lucide.createIcons();
            loadChat(id);
        }

        async function loadChat(id) {
            const res = await fetch(`${API}?sheet=Messages&pId=${id}&email=${email}`);
            const data = await res.json();
            document.getElementById('chat').innerHTML = data.map(m => `
                <div class="bubble ${m.From === ADMIN_EMAIL ? 'b-admin' : 'b-client'}">
                    <div style="font-size:0.6rem; opacity:0.5; margin-bottom:4px;">${m.From}</div>
                    ${m['Message Text']}
                </div>
            `).join('') || 'No conversation yet.';
            document.getElementById('chat').scrollTop = 99999;
        }

        async function send(id, cEmail) {
            const txt = document.getElementById('msg').value; if(!txt) return;
            await fetch(API, { method: 'POST', body: JSON.stringify({ sheet: "Messages", action: "add", "Project ID": id, "From": email, "Message Text": txt, clientEmail: cEmail })});
            openDetails(id);
        }

        async function createProject() {
            const { value: v } = await Swal.fire({
                title: 'New Production', background: '#050508', color: '#fff',
                html: `<input id="n-name" placeholder="Project Name" class="swal2-input">
                       <input id="n-email" placeholder="Client Email" class="swal2-input" value="${isAdmin?'':email}">
                       <input id="n-budget" placeholder="Budget (BDT)" class="swal2-input">`,
                preConfirm: () => [document.getElementById('n-name').value, document.getElementById('n-email').value, document.getElementById('n-budget').value]
            });
            if(v) {
                await fetch(API, { method: 'POST', body: JSON.stringify({ action: "add", sheet: "Projects", "Project Name": v[0], "Client Email": v[1], "Budget (BDT)": v[2], "Deadline": "TBD" })});
                sync();
            }
        }

        async function update(id) {
            const s = document.getElementById('u-status').value;
            const p = document.getElementById('u-prog').value;
            await fetch(API, { method: 'POST', body: JSON.stringify({ action: "update", "Project ID": id, Status: s, Progress: p })});
            Swal.fire('Updated!', '', 'success'); sync();
        }

        async function del(id) {
            if(confirm('Delete permanently?')) { 
                await fetch(API, { method: 'POST', body: JSON.stringify({ action: "delete", "Project ID": id })});
                sync(); Swal.close();
            }
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.p-card');
            cards.forEach(c => {
                const text = c.innerText.toLowerCase();
                c.style.display = text.includes(val) ? 'block' : 'none';
            });
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        document.getElementById('u-pic').src = localStorage.getItem('clientPic');
        sync();
        setInterval(sync, 30000); // অটো রিফ্রেশ
    </script>
</body>
</html>
