<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Agency OS</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
    body {
        margin: 0;
        font-family: 'Outfit', sans-serif;
        background: #0b0c10;
        color: #fff;
        display: flex;
        min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
        width: 260px;
        background: #111318;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        border-right: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #3b82f6;
    }

    .menu {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .menu button {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.08);
        color: white;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        text-align: left;
    }

    .menu button:hover {
        background: rgba(59,130,246,0.15);
    }

    /* MAIN */
    .main {
        flex: 1;
        padding: 20px;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    .card {
        background: #151823;
        padding: 15px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.05);
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        font-size: 14px;
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        text-align: left;
    }

    th {
        color: #94a3b8;
    }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">Agency OS</div>

    <div class="menu">
        <button onclick="loadDashboard()">Dashboard</button>
        <button onclick="loadProjects()">Projects</button>
        <button onclick="loadRevisions()">Revisions</button>
        <button onclick="loadMessages()">Messages</button>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h2 id="title">Dashboard</h2>
        <div id="userInfo"></div>
    </div>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3>Active</h3>
            <p id="activeCount">0</p>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <p id="completedCount">0</p>
        </div>

        <div class="card">
            <h3>Revisions</h3>
            <p id="revisionCount">0</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p id="revenue">0 BDT</p>
        </div>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Project ID</th>
                <th>Name</th>
                <th>Status</th>
                <th>Editor</th>
                <th>Deadline</th>
            </tr>
        </thead>
        <tbody id="projectTable">
        </tbody>
    </table>

</div>

<script>
    const API_URL = "YOUR_GOOGLE_SCRIPT_WEB_APP_URL_HERE";

    let user = {
        email: localStorage.getItem("clientEmail"),
        name: localStorage.getItem("clientName"),
        role: "client"
    };

    document.getElementById("userInfo").innerText =
        user.name ? user.name : "Guest";

    // =========================
    // LOAD DASHBOARD
    // =========================
    async function loadDashboard() {
        document.getElementById("title").innerText = "Dashboard";

        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "getDashboard",
                email: user.email,
                role: user.role
            })
        });

        const data = await res.json();

        document.getElementById("activeCount").innerText = data.active;
        document.getElementById("completedCount").innerText = data.completed;
        document.getElementById("revisionCount").innerText = data.revision;
        document.getElementById("revenue").innerText = data.revenue + " BDT";
    }

    // =========================
    // LOAD PROJECTS
    // =========================
    async function loadProjects() {
        document.getElementById("title").innerText = "Projects";

        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "getProjects",
                email: user.email,
                role: user.role
            })
        });

        const data = await res.json();

        const table = document.getElementById("projectTable");
        table.innerHTML = "";

        data.forEach(row => {
            table.innerHTML += `
                <tr>
                    <td>${row[1]}</td>
                    <td>${row[3]}</td>
                    <td>${row[10]}</td>
                    <td>${row[7]}</td>
                    <td>${row[20]}</td>
                </tr>
            `;
        });
    }

    function loadRevisions(){
        alert("Next Step: Revision UI will connect here");
    }

    function loadMessages(){
        alert("Next Step: Message UI will connect here");
    }

    // INIT
    loadDashboard();
</script>

<script src="api.js"></script>
<script src="portal-script.js"></script>

</body>
</html>
