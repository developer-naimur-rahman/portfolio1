<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgencyOS Dashboard v2</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Outfit;
    background:#0b0c10;
    color:white;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:#111318;
    padding:20px;
    height:100vh;
}

.sidebar button{
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#1f2937;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#3b82f6;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.card{
    background:#151823;
    padding:15px;
    border-radius:10px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #222;
    text-align:left;
    font-size:14px;
}

th{color:#94a3b8;}
</style>
</head>

<body>

    <button onclick="openProjectModal()">+ New Project</button>

    <div id="projectModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7);">
    
    <div style="background:#111; padding:20px; width:400px; margin:100px auto; border-radius:10px;">
        
        <h3>Create New Project</h3>

        <input id="projectName" placeholder="Project Name" /><br><br>
        <input id="category" placeholder="Category" /><br><br>
        <input id="budget" placeholder="Budget" /><br><br>
        <input id="deadline" placeholder="Deadline" /><br><br>

        <button onclick="submitProject()">Create</button>
        <button onclick="closeProjectModal()">Close</button>

    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>AgencyOS</h3>

    <button onclick="loadDashboard()">Dashboard</button>
    <button onclick="loadProjects()">Projects</button>
    <button onclick="loadCreateProject()">Create Project</button>
    <button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <h2 id="title">Dashboard</h2>
    <p id="userBox"></p>

    <!-- CARDS -->
    <div class="cards">
        <div class="card">Active <h3 id="active">0</h3></div>
        <div class="card">Completed <h3 id="completed">0</h3></div>
        <div class="card">Revisions <h3 id="revision">0</h3></div>
        <div class="card">Revenue <h3 id="revenue">0</h3></div>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Editor</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

</div>

<script src="api.js"></script>

<script>
// ==========================
// USER SESSION
// ==========================
// =========================
// USER INFO
// =========================
const user = {
    email: localStorage.getItem("clientEmail"),
    name: localStorage.getItem("clientName"),
    role: localStorage.getItem("currentRole") || "client"
};

// =========================
// INIT
// =========================
document.getElementById("userInfo").innerText =
    user.name ? user.name : "Guest";

// =========================
// LOAD DASHBOARD
// =========================
async function loadDashboard() {
    document.getElementById("title").innerText = "Dashboard";

    const data = await getDashboard(user.email, user.role);

    if (!data) return;

    document.getElementById("activeCount").innerText = data.active || 0;
    document.getElementById("completedCount").innerText = data.completed || 0;
    document.getElementById("revisionCount").innerText = data.revision || 0;
    document.getElementById("revenue").innerText = (data.revenue || 0) + " BDT";
}

// =========================
// LOAD PROJECTS
// =========================
async function loadProjects() {
    document.getElementById("title").innerText = "Projects";

    const data = await getProjects(user.email, user.role);

    const table = document.getElementById("projectTable");
    table.innerHTML = "";

    if (!data || !Array.isArray(data)) return;

    data.forEach(row => {
        table.innerHTML += `
            <tr>
                <td>${row[1] || ""}</td>
                <td>${row[3] || ""}</td>
                <td>${row[10] || ""}</td>
                <td>${row[7] || ""}</td>
                <td>${row[20] || ""}</td>
            </tr>
        `;
    });
}

// =========================
// PLACEHOLDER FUNCTIONS
// =========================
function loadRevisions() {
    alert("Revision system coming next step");
}

function loadMessages() {
    alert("Message system coming next step");
}

// =========================
// INIT LOAD
// =========================
loadDashboard();

</script>

<script>
function openProjectModal() {
    document.getElementById("projectModal").style.display = "block";
}

function closeProjectModal() {
    document.getElementById("projectModal").style.display = "none";
}

async function submitProject() {

    const data = {
        clientEmail: user.email,
        projectName: document.getElementById("projectName").value,
        category: document.getElementById("category").value,
        budget: document.getElementById("budget").value,
        deadline: document.getElementById("deadline").value
    };

    const res = await createProject(data);

    if (res.success) {
        alert("Project Created!");
        closeProjectModal();
        loadProjects();
        loadDashboard();
    } else {
        alert("Failed to create project");
    }
}
</script>


</body>
</html>
