<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Dashboard | Motion Of Naimur</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.7);
            --primary: #3b82f6;
            --accent: #6366f1;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0; font-family: 'Outfit', sans-serif;
            background: var(--bg); color: var(--text); overflow-x: hidden;
            background: radial-gradient(circle at top right, #1e1b4b 0%, #050505 100%);
            min-height: 100vh;
        }

        /* Navbar Styling */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1.2rem 5%; background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary); }

        /* Dashboard Container */
        .container { padding: 3rem 5%; max-width: 1400px; margin: 0 auto; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3rem; }
        h2 { font-size: 2rem; margin: 0; font-weight: 600; background: linear-gradient(to right, #fff, #64748b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Project Card Grid */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2rem; }

        .project-card {
            background: var(--card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 1.8rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .project-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* Status & Budget */
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .status-badge { padding: 6px 14px; border-radius: 50px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; background: rgba(59, 130, 246, 0.1); color: var(--primary); border: 1px solid rgba(59, 130, 246, 0.2); }
        .budget-tag { color: #4ade80; font-weight: 600; font-size: 1rem; }

        /* Dynamic Content Sections */
        .section-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin: 1.2rem 0 0.8rem 0; display: block; font-weight: 600; }
        
        .link-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-link { 
            display: flex; align-items: center; gap: 8px; padding: 10px; 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; color: #cbd5e1; text-decoration: none; font-size: 0.85rem; transition: 0.3s;
        }
        .btn-link:hover { background: var(--primary); color: white; border-color: var(--primary); }

        .delivery-btn {
            width: 100%; margin-top: 10px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s;
        }

        /* Message & Revision List */
        .data-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; max-height: 120px; overflow-y: auto; font-size: 0.85rem; border: 1px solid var(--border); }
        .data-item { padding: 8px; border-bottom: 1px solid var(--border); color: #94a3b8; }
        .data-item:last-child { border: none; }

        /* Loader */
        .loader { text-align: center; padding: 100px; font-size: 1.2rem; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div style="display:flex; align-items:center; gap:12px;">
            <i data-lucide="monitor-play" style="color:var(--primary); width:32px; height:32px;"></i>
            <h1 style="font-size:1.2rem; letter-spacing:2px; margin:0;">MOTION OF NAIMUR</h1>
        </div>
        <div class="user-profile">
            <span id="u-name" style="font-size:0.9rem; color:#94a3b8;"></span>
            <img id="u-pic" src="" alt="Profile">
            <button onclick="logout()" style="background:none; border:1px solid #333; color:white; padding:8px 15px; border-radius:10px; cursor:pointer; font-size:0.8rem;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-flex">
            <div>
                <h2>Client Workspace</h2>
                <p style="color:#64748b; margin-top:5px;">Manage your video production ecosystem</p>
            </div>
            <button onclick="addNewProject()" style="background:var(--primary); color:white; border:none; padding:14px 28px; border-radius:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);">
                <i data-lucide="plus-circle"></i> Create New Project
            </button>
        </div>

        <div id="project-list" class="project-grid">
            <div class="loader">Fetching your creative data...</div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbylKkKbbLkP8-M4_8Yi6eYFJF3V4gW4sLOeZ7sUyl1pCImSzFEGkFkdeEKnyhCYQgx8uA/exec";
        const email = localStorage.getItem('clientEmail');

        if(!email) window.location.href = 'index.html';
        document.getElementById('u-name').innerText = localStorage.getItem('clientName');
        document.getElementById('u-pic').src = localStorage.getItem('clientPic');

        async function initDashboard() {
            try {
                // ৩টি শীট থেকে একযোগে ডাটা ফেচ করা
                const [projects, revisions, messages] = await Promise.all([
                    fetch(`${API_URL}?sheet=Projects&email=${email}`).then(r => r.json()),
                    fetch(`${API_URL}?sheet=Revisions&email=${email}`).then(r => r.json()),
                    fetch(`${API_URL}?sheet=Messages&email=${email}`).then(r => r.json())
                ]);

                const container = document.getElementById('project-list');
                container.innerHTML = '';

                projects.forEach(p => {
                    const pId = p['Project ID'];
                    const pRevisions = revisions.filter(r => r['Project ID'] == pId);
                    const pMessages = messages.filter(m => m['Project ID'] == pId);

                    container.innerHTML += `
                        <div class="project-card">
                            <div class="card-top">
                                <span class="status-badge">${p['Status'] || 'Editing'}</span>
                                <span class="budget-tag">৳ ${p['Budget (BDT)'] || '0'}</span>
                            </div>

                            <h3 style="margin:0 0 10px 0;">${p['Project Name']}</h3>
                            <p style="color:#64748b; font-size:0.85rem; margin-bottom:20px;">
                                <i data-lucide="calendar" style="width:14px; vertical-align:middle;"></i> Deadline: ${p['Deadline'] || 'Flexible'}
                            </p>

                            <span class="section-label">Assets & Resources</span>
                            <div class="link-group">
                                <a href="${p['Footage Link']}" target="_blank" class="btn-link"><i data-lucide="video"></i> Footage</a>
                                <a href="${p['Script Link']}" target="_blank" class="btn-link"><i data-lucide="file-text"></i> Script</a>
                            </div>

                            <button onclick="window.open('${p['Delivery Link']}', '_blank')" class="delivery-btn">
                                <i data-lucide="play-circle"></i> View Final Delivery
                            </button>

                            <span class="section-label">Revisions (${pRevisions.length})</span>
                            <div class="data-box">
                                ${pRevisions.map(rev => `<div class="data-item"><b>v${rev['Revision Number']}:</b> ${rev['Revision Notes']}</div>`).join('') || '<div class="data-item">No revisions requested.</div>'}
                            </div>

                            <span class="section-label">Communication Feed</span>
                            <div class="data-box">
                                ${pMessages.map(msg => `<div class="data-item"><small>${msg['Timestamp']}</small><br>${msg['Message Text']}</div>`).join('') || '<div class="data-item">No messages yet.</div>'}
                            </div>

                            <div style="margin-top:20px; display:flex; gap:10px;">
                                <button onclick="requestRevision('${pId}')" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #333; color:white; padding:10px; border-radius:10px; cursor:pointer; font-size:0.8rem;">Request Revision</button>
                                <button onclick="sendMessage('${pId}')" style="flex:1; background:rgba(255,255,255,0.05); border:1px solid #333; color:white; padding:10px; border-radius:10px; cursor:pointer; font-size:0.8rem;">Chat with Naimur</button>
                            </div>
                        </div>
                    `;
                });
                lucide.createIcons();
            } catch (e) { console.error("Error loading dashboard:", e); }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        initDashboard();
    </script>
</body>
</html>
